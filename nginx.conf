server {
    listen 80;
    server_name hyperspire.com; # Replace with your domain if you have one

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hyperspire.com; # Replace with your domain if you have one

    # SSL Configuration - Using the certs from your previous config
    ssl_certificate /home/opc/hyperspire/ssl/key.pem;
    ssl_certificate_key /home/opc/hyperspire/ssl/hyperspire.key;

    # Note: If your key.pem and cert.pem don't work like this, you might need 
    # to combine the cert and intermediates into a fullchain.pem for nginx:
    # cat cert.pem intermediates.pem > fullchain.pem

    # Security Headers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass https://127.0.0.1:8443;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
